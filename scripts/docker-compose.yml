services:
  llamacpp-wasm-builder:
    container_name: llamacpp-wasm-builder
    build:
      context: .
      dockerfile_inline: |
        ARG EMSDK_IMAGE_TAG=none  # modify it in build_wasm.sh
        FROM emscripten/emsdk:$${EMSDK_IMAGE_TAG}
        RUN apt update && apt install -y git
      args:
        EMSDK_IMAGE_TAG: ${EMSDK_IMAGE_TAG}
    user: "${D_UID}:${D_GID}"
    volumes:
      - ..:/source:Z
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        cd /source

        export SHARED_EMCC_FLAGS="--no-entry -O3 -msimd128 -DNDEBUG -flto=full -frtti -fwasm-exceptions -sEXPORT_ALL=1 -sEXPORT_ES6=0 -sMODULARIZE=0 -sINITIAL_MEMORY=128MB -sMAXIMUM_MEMORY=4096MB -sALLOW_MEMORY_GROWTH=1 -sFORCE_FILESYSTEM=1 -sEXPORTED_FUNCTIONS=_main,_wllama_malloc,_wllama_start,_wllama_action,_wllama_exit,_wllama_debug,_wllama_get_last_error -sEXPORTED_RUNTIME_METHODS=ccall,cwrap,HEAPU8 -sNO_EXIT_RUNTIME=1 -Wno-unused-command-line-argument -sJSPI -sJSPI_EXPORTS=['wllama_start','wllama_action']"

        BUILD_ROOT=/tmp/wllama-wasm-build
        rm -rf "$$BUILD_ROOT"

        mkdir -p "$$BUILD_ROOT/single-thread"
        cd "$$BUILD_ROOT/single-thread"
        emcmake cmake /source
        export EMCC_CFLAGS="$$SHARED_EMCC_FLAGS"
        emmake make wllama -j

        cd /source

        mkdir -p "$$BUILD_ROOT/multi-thread"
        cd "$$BUILD_ROOT/multi-thread"
        export EMCC_CFLAGS="" # temporary clear it
        emcmake cmake /source
        export EMCC_CFLAGS="$$SHARED_EMCC_FLAGS -pthread -sUSE_PTHREADS=1 -sPTHREAD_POOL_SIZE=Module[\\\"pthreadPoolSize\\\"]"
        emmake make wllama -j

        # list files
        echo "$$BUILD_ROOT/single-thread"; ls -lh "$$BUILD_ROOT/single-thread"
        echo "$$BUILD_ROOT/multi-thread";  ls -lh "$$BUILD_ROOT/multi-thread"

        # copy output files
        mkdir -p /source/src/multi-thread
        mkdir -p /source/src/single-thread
        cp "$$BUILD_ROOT/multi-thread/wllama.js"   /source/src/multi-thread
        cp "$$BUILD_ROOT/multi-thread/wllama.wasm" /source/src/multi-thread
        cp "$$BUILD_ROOT/single-thread/wllama.js"  /source/src/single-thread
        cp "$$BUILD_ROOT/single-thread/wllama.wasm" /source/src/single-thread
